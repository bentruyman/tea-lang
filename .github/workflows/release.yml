name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (for example 0.1.0 or 0.1.0-alpha.1). Leading v is optional."
        required: true
        type: string
      ref:
        description: "Branch to release from. Defaults to the default branch."
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.version }}
  cancel-in-progress: false

jobs:
  validate:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      release_branch: ${{ steps.release_ref.outputs.branch }}
      release_ref: ${{ steps.release_ref.outputs.ref }}
      release_sha: ${{ steps.release_commit.outputs.sha }}
      release_tag: ${{ steps.release_version.outputs.tag }}
      release_version: ${{ steps.release_version.outputs.version }}
      prerelease: ${{ steps.release_version.outputs.prerelease }}

    steps:
      - name: Resolve release ref
        id: release_ref
        run: |
          value="${{ inputs.ref }}"
          if [[ -z "${value}" ]]; then
            value="${{ github.event.repository.default_branch }}"
          fi
          if [[ "${value}" == refs/heads/* ]]; then
            branch="${value#refs/heads/}"
            ref="${value}"
          elif [[ "${value}" == refs/tags/* ]]; then
            echo "release ref must be a branch, not a tag" >&2
            exit 1
          elif [[ "${value}" =~ ^[0-9a-f]{40}$ ]]; then
            echo "release ref must be a branch name, not a detached commit SHA" >&2
            exit 1
          else
            branch="${value}"
            ref="refs/heads/${value}"
          fi
          echo "branch=${branch}" >> "${GITHUB_OUTPUT}"
          echo "ref=${ref}" >> "${GITHUB_OUTPUT}"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.release_ref.outputs.branch }}

      - name: Normalize release version
        id: release_version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          node <<'NODE' >> "${GITHUB_OUTPUT}"
          const raw = (process.env.INPUT_VERSION ?? "").trim();
          const normalized = raw.startsWith("v") ? raw.slice(1) : raw;
          const semverRe =
            /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$/;

          if (!semverRe.test(normalized)) {
            console.error(
              `release version must look like 0.1.0 or 0.1.0-alpha.1, got "${raw}"`,
            );
            process.exit(1);
          }

          process.stdout.write(`version=${normalized}\n`);
          process.stdout.write(`tag=v${normalized}\n`);
          process.stdout.write(
            `prerelease=${normalized.includes("-") ? "true" : "false"}\n`,
          );
          NODE

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Prepare release metadata
        env:
          VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          bun install --frozen-lockfile
          bun scripts/release.mjs prepare "${VERSION}"

      - name: Verify version metadata
        env:
          VERSION: ${{ steps.release_version.outputs.version }}
        run: |
          expected="${VERSION}"
          mismatches="$(
            {
              grep -Hn '^version = "' Cargo.toml tea-*/Cargo.toml tea-web/Cargo.toml || true
              grep -Hn '"version": "' tree-sitter-tea/package.json tree-sitter-tea/tree-sitter.json www/package.json www/public/tea-web/pkg/package.json || true
            } | grep -v "${expected}" || true
          )"
          if [[ -n "${mismatches}" ]]; then
            echo "release metadata does not match ${expected}:" >&2
            echo "${mismatches}" >&2
            exit 1
          fi

      - name: Commit release prep
        id: release_commit
        env:
          VERSION: ${{ steps.release_version.outputs.version }}
          RELEASE_BRANCH: ${{ steps.release_ref.outputs.branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --short)" ]]; then
            git add -A
            git commit -m "chore: prepare ${VERSION} release"
            git push origin "HEAD:${RELEASE_BRANCH}"
          fi
          echo "sha=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

      - name: Verify tea binary name
        run: |
          if ! grep -q 'name = "tea"' tea-cli/Cargo.toml; then
            echo "tea-cli/Cargo.toml must define a tea binary target" >&2
            exit 1
          fi

      - name: Verify bundled linkkit provenance manifest
        run: test -f dist/linkkit-provenance.toml

      - name: Create or validate git tag
        env:
          VERSION: ${{ steps.release_version.outputs.tag }}
          RELEASE_SHA: ${{ steps.release_commit.outputs.sha }}
        run: |
          git fetch --tags --force

          if git rev-parse --verify "refs/tags/${VERSION}" >/dev/null 2>&1; then
            tag_sha="$(git rev-list -n 1 "${VERSION}")"
            if [[ "${tag_sha}" != "${RELEASE_SHA}" ]]; then
              echo "existing tag ${VERSION} points at ${tag_sha}, expected ${RELEASE_SHA}" >&2
              exit 1
            fi
          else
            git tag -a "${VERSION}" -m "Release ${VERSION}" "${RELEASE_SHA}"
            git push origin "refs/tags/${VERSION}"
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            unsupported_target: aarch64-apple-darwin
          - os: macos-14
            target: aarch64-apple-darwin
            unsupported_target: x86_64-apple-darwin
    runs-on: ${{ matrix.os }}
    env:
      VERSION: ${{ needs.validate.outputs.release_tag }}
      TARGET: ${{ matrix.target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.release_tag }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux LLVM dependencies
        if: runner.os == 'Linux'
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-17-dev libpolly-17-dev
          echo "LLVM_SYS_170_PREFIX=/usr/lib/llvm-17" >> "${GITHUB_ENV}"
          echo "LLVM_CONFIG_PATH=/usr/lib/llvm-17/bin/llvm-config" >> "${GITHUB_ENV}"

      - name: Install macOS LLVM dependencies
        if: runner.os == 'macOS'
        run: |
          brew install llvm@17
          prefix="$(brew --prefix llvm@17)"
          echo "LLVM_SYS_170_PREFIX=${prefix}" >> "${GITHUB_ENV}"
          echo "LLVM_CONFIG_PATH=${prefix}/bin/llvm-config" >> "${GITHUB_ENV}"
          echo "${prefix}/bin" >> "${GITHUB_PATH}"

      - name: Install root Bun dependencies
        run: bun install --frozen-lockfile

      - name: Generate code from specifications
        run: make codegen

      - name: Cache cargo builds
        uses: Swatinem/rust-cache@v2

      - name: Build bundled Tea runtime archive
        shell: bash
        run: |
          cargo_log="$(mktemp)"
          cargo rustc -p tea-runtime --release --color never -- --print=native-static-libs 2>&1 | tee "${cargo_log}"
          runtime_native_libs="$(sed -E 's/\x1B\[[0-9;]*[[:alpha:]]//g' "${cargo_log}" | sed -n 's/.*native-static-libs: //p' | tail -n 1)"
          if [[ -z "${runtime_native_libs}" ]]; then
            echo "failed to resolve native static libs for tea-runtime" >&2
            exit 1
          fi
          runtime_archive="$(pwd)/target/release/libtea_runtime.a"
          echo "TEA_BUNDLED_RUNTIME_ARCHIVE=${runtime_archive}" >> "${GITHUB_ENV}"
          echo "TEA_BUNDLED_RUNTIME_NATIVE_LIBS=${runtime_native_libs}" >> "${GITHUB_ENV}"
          echo "TEA_BUNDLED_RUNTIME_TARGET=${TARGET}" >> "${GITHUB_ENV}"

      - name: Build release tea binary
        run: cargo build --release -p tea-cli

      - name: Smoke test bundled release binary
        shell: bash
        run: |
          target/release/tea --version
          target/release/tea examples/echo/main.tea hello tea
          target/release/tea build examples/echo/main.tea --output /tmp/tea-release-echo
          /tmp/tea-release-echo hello tea

      - name: Verify bundled mode rejects non-host target
        shell: bash
        run: |
          set +e
          output="$(target/release/tea build examples/echo/main.tea --target "${{ matrix.unsupported_target }}" 2>&1)"
          status=$?
          set -e
          if [[ "${status}" -eq 0 ]]; then
            echo "expected non-host target build to fail" >&2
            exit 1
          fi
          if [[ "${output}" != *"build tea from source"* ]]; then
            echo "expected actionable host-only message, got:" >&2
            echo "${output}" >&2
            exit 1
          fi

      - name: Check Linux LLVM linkage
        if: runner.os == 'Linux'
        run: |
          if ldd target/release/tea | grep -q 'libLLVM'; then
            echo "release tea binary unexpectedly links against libLLVM" >&2
            exit 1
          fi

      - name: Check macOS Homebrew LLVM linkage
        if: runner.os == 'macOS'
        run: |
          if otool -L target/release/tea | grep -q '/opt/homebrew/opt/llvm@17/lib/libLLVM'; then
            echo "release tea binary unexpectedly links against a Homebrew LLVM dylib" >&2
            exit 1
          fi

      - name: Package release archive
        shell: bash
        run: |
          asset_dir="dist/release"
          mkdir -p "${asset_dir}"
          cp target/release/tea "${asset_dir}/tea"

          if [[ "${RUNNER_OS}" == "macOS" ]]; then
            while IFS= read -r dylib_path; do
              [[ -z "${dylib_path}" ]] && continue
              dylib_name="$(basename "${dylib_path}")"
              cp "${dylib_path}" "${asset_dir}/${dylib_name}"
              chmod 0644 "${asset_dir}/${dylib_name}"
              install_name_tool -id "@executable_path/${dylib_name}" "${asset_dir}/${dylib_name}"
              install_name_tool -change "${dylib_path}" "@executable_path/${dylib_name}" "${asset_dir}/tea"
              codesign --force --sign - "${asset_dir}/${dylib_name}"
            done < <(otool -L target/release/tea | awk '/\/opt\/homebrew\// { print $1 }')

            codesign --force --sign - "${asset_dir}/tea"

            if otool -L "${asset_dir}/tea" | grep -q '/opt/homebrew\|/usr/local/opt'; then
              echo "packaged macOS tea binary still links against Homebrew paths" >&2
              otool -L "${asset_dir}/tea" >&2
              exit 1
            fi

            codesign --verify --verbose=4 "${asset_dir}/tea"
            while IFS= read -r dylib_path; do
              [[ -z "${dylib_path}" ]] && continue
              codesign --verify --verbose=4 "${dylib_path}"
            done < <(find "${asset_dir}" -maxdepth 1 -name '*.dylib' | sort)
          fi

          "${asset_dir}/tea" --version

          archive_path="dist/tea-${VERSION}-${TARGET}.tar.gz"
          tar -C "${asset_dir}" -czf "${archive_path}" .
          mv "${archive_path}" "${asset_dir}/"

          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "${asset_dir}/tea-${VERSION}-${TARGET}.tar.gz" > "${asset_dir}/tea-${VERSION}-${TARGET}.sha256"
          else
            shasum -a 256 "${asset_dir}/tea-${VERSION}-${TARGET}.tar.gz" > "${asset_dir}/tea-${VERSION}-${TARGET}.sha256"
          fi

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/release/tea-${{ needs.validate.outputs.release_tag }}-${{ matrix.target }}.tar.gz
            dist/release/tea-${{ needs.validate.outputs.release_tag }}-${{ matrix.target }}.sha256

  publish:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs:
      - validate
      - build

    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/artifacts

      - name: Assemble checksum manifest
        run: |
          mkdir -p dist/final
          find dist/artifacts -name '*.tar.gz' -exec cp {} dist/final/ \;
          find dist/artifacts -name '*.sha256' -print0 | sort -z | xargs -0 awk '
            {
              file = $2
              sub(/^.*\//, "", file)
              print $1 "  " file
            }
          ' > "dist/final/tea-${{ needs.validate.outputs.release_tag }}-SHA256SUMS.txt"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.release_tag }}
          prerelease: ${{ needs.validate.outputs.prerelease }}
          generate_release_notes: true
          files: |
            dist/final/*.tar.gz
            dist/final/tea-${{ needs.validate.outputs.release_tag }}-SHA256SUMS.txt
